# GLCDI Participant Identity Hub Configuration
# Copy to idh-configuration.properties and adjust for your participant

web.http.port=7080
web.http.path=/api
web.http.credentials.port=7081
web.http.credentials.path=/credentials
web.http.identity.port=7082
web.http.identity.path=/api/identity
web.http.did.port=7083
web.http.did.path=/
web.http.sts.port=7084
web.http.sts.path=/sts
web.http.version.port=7085
web.http.version.path=/api/version

# Decentralized identity configuration
edc.iam.did.web.use.https=false
edc.ih.iam.id=did:web:host.docker.internal%3A8080
edc.ih.credentials.path=/app/conf/credentials/dev

# Key pair used for SI token signature & VP signature
edc.iam.privatekey.alias=key-1
edc.iam.publickey.id=did:web:host.docker.internal%3A8080#key-1
edc.ih.iam.privatekey=-----BEGIN EC PRIVATE KEY-----\nMHcCAQEEIARDUGJgKy1yzxkueIJ1k3MPUWQ/tbQWQNqW6TjyHpdcoAoGCCqGSM49\nAwEHoUQDQgAE1l0Lof0a1yBc8KXhesAnoBvxZw5roYnkAXuqCYfNK3ex+hMWFuiX\nGUxHlzShAehR6wvwzV23bbC0tcFcVgW//A==\n-----END EC PRIVATE KEY-----
edc.ih.iam.publickey=-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE1l0Lof0a1yBc8KXhesAnoBvxZw5r\noYnkAXuqCYfNK3ex+hMWFuiXGUxHlzShAehR6wvwzV23bbC0tcFcVgW//A==\n-----END PUBLIC KEY-----

edc.dsp.root.url=http://host.docker.internal:8080
edc.dsp.root.path=protocol
edc.dsp.presentation.root.url=http://host.docker.internal:8080/credentials

edc.iam.sts.oauth.client.secret.alias=sts-alias-secret
edc.iam.sts.oauth.client.secret=clientSecretParticipantSts
