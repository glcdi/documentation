# Tier-1 IAM (IMPLEM_PLAN § 1.5.4) - custom glcdi-iam-keycloak extension.
# Replaces iam-mock with a plain OAuth2 client_credentials flow against
# the Authority Keycloak. Outgoing: POST to /token with client_id +
# vault-stored secret + scope=glcdi-claims. Incoming: validate JWT
# signature against /certs (JWKS), copy glcdi_* claims into
# ParticipantAgent so glcdi-policy-functions sees them.
glcdi.iam.kc.token.url=http://host.docker.internal:8090/auth/realms/glcdi/protocol/openid-connect/token
glcdi.iam.kc.jwks.url=http://host.docker.internal:8090/auth/realms/glcdi/protocol/openid-connect/certs
glcdi.iam.kc.client.id=glcdi-connector-white-buffalo
# Tier-1 dev convenience: plaintext secret in config. InMemoryVault doesn't
# load edc.vault.secrets.* entries from the .properties file. Production
# should run a real vault extension and swap this for an alias indirection.
glcdi.iam.kc.client.secret=28a0f657d9130c4548a02b53cf92b242d5e9091e13041f40f38329dee8531e83
glcdi.iam.kc.scope=glcdi-claims

edc.dataplane.api.public.baseurl=http://host.docker.internal:8082/public/

# Local-dev only: rewrite UI-facing hostnames in asset baseUrl / oauth2:tokenUrl
# to container-reachable ones at fetch time. Leave EMPTY in production so the
# public URLs the operator entered are fetched verbatim.
glcdi.dataplane.host.rewrite=localhost=host.docker.internal,127.0.0.1=host.docker.internal
