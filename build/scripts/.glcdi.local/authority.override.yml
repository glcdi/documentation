services:
  keycloak:
    ports: !override
      - "8090:8080"
    volumes:
      - /home/balessan/Workspaces/Dataspaces/glcdi/management/scripts/.glcdi.local/glcdi-realm.json:/opt/keycloak/data/import-template/glcdi-realm.json:ro
